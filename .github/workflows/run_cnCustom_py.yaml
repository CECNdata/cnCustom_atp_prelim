name: 'run_cnCustom_py'

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 18-25 * *'

env:
  retry: 3
  repo_name: CECNdata/cnCustom_atp_prelim
  repo_token: ${{ secrets.repo_token }}

jobs:
  release_day:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codes
        uses: actions/checkout@v3
        with:
          repository: '${{ env.repo_name }}'
           # `GH_PAT` is a secret that contains you PAT
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          cd .github
          python -m pip install --upgrade pip
          # 禁用root警告（CI环境下可接受）
          pip install fire pipreqs --root-user-action=ignore
          # 生成requirements.txt并清理冲突版本
          pipreqs . --force --encoding=utf-8
          # 移除冲突的playwright/numpy版本，写入兼容版本
          sed -i '/playwright/d' requirements.txt
          sed -i '/numpy/d' requirements.txt
          echo "playwright==1.40.0" >> requirements.txt
          echo "numpy==2.4.3" >> requirements.txt  # Python3.11兼容，若用3.10则改为2.2.6
          # 安装依赖
          pip install -r requirements.txt --root-user-action=ignore

      - name: Install Playwright
        run: |
          # 安装Firefox系统依赖
          npx playwright install-deps firefox
          # Playwright 1.40.0不支持@版本号，直接安装默认绑定的121.0版本
          python -m playwright install firefox
          sudo playwright install-deps

      - name: check ip
        run: |
            curl ifconfig.me
            
      - name: run customs download
        continue-on-error: true
        run: |
           cp ./.github/*py ./
           DEBUG=pw:api timeout 1800 xvfb-run python *py
